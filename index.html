<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BarberPro — Tradição & Estilo em cada corte</title>
    <meta name="description" content="BarberPro - Agende seu corte de cabelo online. Tradição & Estilo em cada corte. Seg–Sáb: 09h–20h." />
    <meta property="og:title" content="BarberPro — Agendamento de Barbearia" />
    <meta property="og:description" content="Agende seu horário online na BarberPro. Tradição & Estilo em cada corte." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#C9A84C" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      /* Critical CSS for pre-rendered content */
      .prerender-root { min-height: 100vh; background: #0A0A0A; color: #F0EDE6; font-family: 'DM Sans', sans-serif; }
      .prerender-hero { position: relative; min-height: 92vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden; }
      .prerender-hero-bg { position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 40%, #1A1400 0%, #0A0A0A 100%); }
      .prerender-hero-content { position: relative; z-index: 1; padding: 0 20px; }
      .prerender-hero-content p.sub { color: #C9A84C; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 16px; }
      .prerender-hero-content h1 { font-family: 'Playfair Display', serif; font-size: clamp(42px, 12vw, 96px); line-height: 1; color: #F0EDE6; margin-bottom: 12px; }
      .prerender-hero-content .line { width: 60px; height: 2px; background: #C9A84C; margin: 0 auto 20px; }
      .prerender-hero-content .slogan { color: #9A9590; font-size: clamp(15px, 4vw, 18px); max-width: 460px; margin: 0 auto 40px; line-height: 1.6; }
      .prerender-hero-content .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
      .prerender-hero-content .btn-gold { background: #C9A84C; color: #000; border: none; border-radius: 50px; padding: 14px 32px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; }
      .prerender-hero-content .btn-outline { background: transparent; color: #C9A84C; border: 1px solid #C9A84C; border-radius: 50px; padding: 14px 32px; font-size: 15px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; }
      .prerender-loading { text-align: center; padding: 60px 20px; }
      .prerender-loading .skeleton { background: #222; border-radius: 8px; animation: pulse 1.5s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Pre-rendered content: visible before JS loads -->
      <div class="prerender-root">
        <div style="background: #111; border-bottom: 1px solid #2A2520; padding: 0 16px; height: 64px; display: flex; align-items: center; position: sticky; top: 0; z-index: 100;">
          <span style="font-family: 'Playfair Display', serif; font-size: 20px; color: #C9A84C; letter-spacing: 1.5px; font-weight: 700;">BarberPro</span>
        </div>
        <div class="prerender-hero">
          <div class="prerender-hero-bg"></div>
          <div class="prerender-hero-content">
            <p class="sub">Est. 2020</p>
            <h1>BarberPro</h1>
            <div class="line"></div>
            <p class="slogan">Tradição & Estilo em cada corte</p>
            <div class="btns">
              <button class="btn-gold">Agendar Horário</button>
              <button class="btn-outline">Ver Serviços</button>
            </div>
          </div>
        </div>
        <div class="prerender-loading">
          <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1000px; margin: 0 auto;">
            <div class="skeleton" style="height: 140px;"></div>
            <div class="skeleton" style="height: 140px;"></div>
            <div class="skeleton" style="height: 140px;"></div>
          </div>
        </div>
      </div>
      <!-- React will replace this content on hydration -->
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
